services:
  - type: web
    name: message-feed-frontend
    runtime: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          name: message-feed-backend
          type: web
          property: url
      - key: VITE_API_URL
        fromService:
          name: message-feed-backend
          type: web
          property: url
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html